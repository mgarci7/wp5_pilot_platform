# experimental_settings.toml

############################################################
# Treatment Group Specification (STAGE Framework)
#
# Each group defines a `treatment` string that is injected into the Director prompt.
# The Director uses this to satisfy the "internal validity" criterion when
# deciding which agent should act and what instructions to give the Performer.
#
# `scenario` selects experiment-specific lifecycle behaviour (seed content,
# agent gating, etc.).  Available scenarios: "base", "news_article".
############################################################

# ── Shared chatroom context ─────────────────────────────────
chatroom_context = """
This is a Spanish-language chatroom on Telegram, based in Spain. Messages must be written in Spanish.
The participant has posted an opinion about a news article. The Director must preserve the assigned treatment condition.
"""

# ── Shared article seed for all groups ─────────────────────

# ── 9-cell design: incivility (low/medium/high) x alignment (against/mixed/favor) ──

[groups.low_against]
scenario = "news_article"
treatment = """
Maintain LOW incivility and MAJORITY AGAINST the participant (about 3:1 turns against).
Incivility dimensions:
- Impoliteness: low; disagreement can be firm but respectful.
- Hate speech: none. No dehumanization, no slurs, no group-targeted contempt.
- Threats to democratic freedoms: none. Do not delegitimize elections or justify authoritarian restrictions.
Safety: no physical threats, no incitement to violence.
"""

[groups.low_against.seed]
type = "news_article"
headline = "A climate report warns that 2°C will be exceeded before 2030"
source = "Reuters"
body = "A new UN report published today warns that global temperatures are on track to exceed the critical 2°C warming threshold before the end of the decade, much sooner than previously anticipated. The report calls for immediate and drastic reductions in greenhouse gas emissions."

[groups.low_mixed]
scenario = "news_article"
treatment = """
Maintain LOW incivility and MIXED alignment (roughly balanced support/opposition).
Incivility dimensions:
- Impoliteness: low.
- Hate speech: none.
- Threats to democratic freedoms: none.
Safety: no physical threats, no incitement to violence.
"""

[groups.low_mixed.seed]
type = "news_article"
headline = "A climate report warns that 2°C will be exceeded before 2030"
source = "Reuters"
body = "A new UN report published today warns that global temperatures are on track to exceed the critical 2°C warming threshold before the end of the decade, much sooner than previously anticipated. The report calls for immediate and drastic reductions in greenhouse gas emissions."

[groups.low_favor]
scenario = "news_article"
treatment = """
Maintain LOW incivility and MAJORITY IN FAVOR of the participant (about 3:1 turns in favor).
Incivility dimensions:
- Impoliteness: low.
- Hate speech: none.
- Threats to democratic freedoms: none.
Safety: no physical threats, no incitement to violence.
"""

[groups.low_favor.seed]
type = "news_article"
headline = "A climate report warns that 2°C will be exceeded before 2030"
source = "Reuters"
body = "A new UN report published today warns that global temperatures are on track to exceed the critical 2°C warming threshold before the end of the decade, much sooner than previously anticipated. The report calls for immediate and drastic reductions in greenhouse gas emissions."

[groups.medium_against]
scenario = "news_article"
treatment = """
Maintain MEDIUM incivility and MAJORITY AGAINST the participant (about 3:1 turns against).
Message length: keep messages punchy, usually one short sentence (roughly 6–18 words).
Incivility dimensions:
- Impoliteness: medium; marked sarcasm and dismissive tone are allowed.
- Hate speech: indirect/problematic generalizations may appear, but no slurs or explicit dehumanization.
- Threats to democratic freedoms: mild delegitimization and manipulation claims are allowed.
Safety: no physical threats, no incitement to violence.
"""

[groups.medium_against.seed]
